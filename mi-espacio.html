<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Espacio — CSH Talent</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --petrol: #2F4E5F; --petrol-soft: #4A90A4; --petrol-pale: #e6ecef; --petrol-dark: #1e3340;
  --coral: #E87B6F; --coral-deep: #d26359; --coral-pale: #fdece9;
  --brand-red: #b5404a; --dark: #111827; --text: #1f2937; --muted: #6b7280; --muted2: #9ca3af;
  --border: #e5e7eb; --surface: #f9fafb; --white: #ffffff;
}
body { font-family: 'Raleway', sans-serif; background: var(--surface); color: var(--text); min-height: 100vh; }

nav { position: sticky; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(255,255,255,0.97); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); height: 60px; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; }
.nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.nav-logo-mark { display: flex; flex-direction: column; }
.nav-logo-name { font-size: .95rem; font-weight: 800; letter-spacing: .18em; color: var(--dark); line-height: 1; }
.nav-logo-line { height: 1.5px; background: var(--brand-red); margin: 2px 0; }
.nav-logo-sub { font-size: .42rem; font-weight: 500; letter-spacing: .2em; color: var(--muted); text-transform: uppercase; }
.nav-right { display: flex; align-items: center; gap: 1.1rem; }
.btn-nav { font-size: .78rem; font-weight: 700; color: white; padding: .5rem 1.2rem; border-radius: 8px; text-decoration: none; border: none; cursor: pointer; font-family: 'Raleway', sans-serif; letter-spacing: .04em; }
.btn-nav.coral { background: var(--coral); }
.btn-nav.coral:hover { background: var(--coral-deep); }

.main { max-width: 900px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }

.gate-box { text-align: center; padding: 5rem 1.5rem; }
.gate-box h1 { font-size: 1.5rem; font-weight: 800; color: var(--dark); margin-bottom: .75rem; }
.gate-box p { font-size: .9rem; color: var(--muted); margin-bottom: 1.5rem; }

.cuenta-card { background: var(--petrol-dark); border-radius: 20px; padding: 2rem; color: white; margin-bottom: 2.5rem; display: flex; flex-wrap: wrap; gap: 1.5rem; align-items: center; justify-content: space-between; }
.cuenta-nombre { font-size: 1.4rem; font-weight: 800; }
.cuenta-detalle { font-size: .8rem; color: rgba(255,255,255,.65); margin-top: .3rem; }
.membresia-tag { font-size: .72rem; font-weight: 700; letter-spacing: .04em; padding: .5rem 1rem; border-radius: 99px; white-space: nowrap; }
.membresia-tag.activa { background: var(--coral); color: white; }
.membresia-tag.inactiva { background: rgba(255,255,255,.12); color: rgba(255,255,255,.75); }

.modulo { background: white; border: 1px solid var(--border); border-radius: 18px; margin-bottom: 1.75rem; overflow: hidden; }
.modulo-head { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: .75rem; }
.modulo-icon { width: 38px; height: 38px; border-radius: 10px; background: var(--petrol-pale); color: var(--petrol); display: flex; align-items: center; justify-content: center; font-size: .7rem; font-weight: 800; flex-shrink: 0; }
.modulo-titulo { font-size: 1rem; font-weight: 800; color: var(--dark); }
.modulo-count { font-size: .74rem; color: var(--muted); margin-top: 1px; }
.tabla-registros { width: 100%; border-collapse: collapse; }
.tabla-registros th { text-align: left; font-size: .68rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); padding: .75rem 1.5rem; border-bottom: 1px solid var(--border); }
.tabla-registros td { padding: .9rem 1.5rem; font-size: .85rem; color: var(--text); border-bottom: 1px solid var(--border); }
.tabla-registros tr:last-child td { border-bottom: none; }
.estado-pill { font-size: .66rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; padding: .25rem .65rem; border-radius: 99px; background: #eaf5ea; color: #2e7d32; }
.accion-link { font-size: .8rem; font-weight: 700; color: var(--petrol); text-decoration: none; cursor: pointer; margin-right: 1rem; }
.accion-link:hover { text-decoration: underline; }
.vacio { padding: 3rem 1.5rem; text-align: center; color: var(--muted); font-size: .88rem; }
.vacio a { color: var(--petrol); font-weight: 700; }

.modal-overlay { position: fixed; inset: 0; background: rgba(17,24,39,.55); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 1.5rem; }
.modal-overlay.open { display: flex; }
.modal-card { background: white; border-radius: 20px; max-width: 640px; width: 100%; max-height: 85vh; overflow-y: auto; }
.modal-head { background: var(--petrol-dark); color: white; padding: 1.5rem; border-radius: 20px 20px 0 0; position: relative; }
.modal-close { position: absolute; top: 1rem; right: 1.25rem; background: none; border: none; color: rgba(255,255,255,.6); font-size: 1.2rem; cursor: pointer; }
.modal-body { padding: 1.5rem; font-size: .85rem; line-height: 1.8; color: var(--text); }
.modal-body strong { color: var(--dark); }
@media print {
  nav, .btn-nav, .accion-link, .cuenta-card, .modulo, .modal-close { display: none !important; }
  .modal-overlay { position: static; background: none; display: block !important; padding: 0; }
  .modal-card { max-width: 100%; max-height: none; overflow: visible; box-shadow: none; }
}
@media(max-width: 640px){ .tabla-registros thead{ display:none; } .tabla-registros td{ display:block; padding:.4rem 1.5rem; border-bottom:none; } .tabla-registros tr{ border-bottom:1px solid var(--border); padding:.75rem 0; display:block; } }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav id="mainNav">
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-mark">
      <div class="nav-logo-name">CSH TALENT</div>
      <div class="nav-logo-line"></div>
      <div class="nav-logo-sub">Capital Sostenible y Humano</div>
    </div>
  </a>
  <div class="nav-right" id="navRight">
    <a href="#" class="nav-login-link" id="navLoginLink">Iniciar sesión</a>
    <a href="historia.html" class="btn-nav coral">Acerca de CSH Talent</a>
  </div>
</nav>

<div class="main">
  <div id="gateBox" class="gate-box" style="display:none;">
    <h1>Este es tu espacio personal</h1>
    <p>Inicia sesión para ver tu historial organizado por herramienta.</p>
    <button class="btn-nav coral" onclick="window.CSHAuth.open('login')">Iniciar sesión</button>
  </div>

  <div id="contenidoEspacio" style="display:none;">
    <div class="cuenta-card">
      <div>
        <div class="cuenta-nombre" id="cuentaNombre">—</div>
        <div class="cuenta-detalle" id="cuentaDetalle">—</div>
      </div>
      <div class="membresia-tag inactiva" id="membresiaTag">Sin membresía activa</div>
    </div>

    <div id="modulosContainer"></div>
  </div>
</div>

<div class="modal-overlay" id="modalDetalle">
  <div class="modal-card">
    <div class="modal-head">
      <button class="modal-close" onclick="cerrarModal()">✕</button>
      <div style="font-size:1.1rem;font-weight:800;" id="modalTitulo">—</div>
      <div style="font-size:.78rem;color:rgba(255,255,255,.65);margin-top:.25rem;" id="modalSub">—</div>
    </div>
    <div class="modal-body" id="modalBody">Cargando...</div>
    <div style="padding:0 1.5rem 1.5rem;">
      <button class="btn-nav coral" onclick="window.print()">Descargar / Imprimir PDF</button>
    </div>
  </div>
</div>

<script src="csh-auth.js"></script>
<script src="assistant.js"></script>
<script>
const sb = window.getCSHSupabaseClient();
document.getElementById('navLoginLink')?.addEventListener('click', (e) => { e.preventDefault(); window.CSHAuth.open('login'); });

const NOMBRES_MODULO = {
  'cima': { nombre: 'Diagnóstico CIMA®', icono: 'CIMA' }
};

function formatearFecha(iso){
  return new Date(iso).toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' });
}

async function cargarMiEspacio(){
  const { data: { user } } = await sb.auth.getUser();
  if(!user){
    document.getElementById('gateBox').style.display = 'block';
    return;
  }
  document.getElementById('contenidoEspacio').style.display = 'block';

  const { data: profile } = await sb.from('profiles').select('full_name, created_at').eq('id', user.id).maybeSingle();
  const nombre = profile?.full_name || user.email.split('@')[0];
  document.getElementById('cuentaNombre').textContent = nombre;
  const miembroDesde = profile?.created_at ? formatearFecha(profile.created_at) : '—';
  document.getElementById('cuentaDetalle').textContent = `${user.email} · Miembro desde ${miembroDesde}`;

  const { data: membresia } = await sb.from('entitlements')
    .select('expires_at').eq('user_id', user.id).eq('type', 'membership')
    .gt('expires_at', new Date().toISOString()).order('expires_at', { ascending: false }).limit(1).maybeSingle();
  const tagMembresia = document.getElementById('membresiaTag');
  if(membresia){
    tagMembresia.textContent = `Membresía activa hasta ${formatearFecha(membresia.expires_at)}`;
    tagMembresia.className = 'membresia-tag activa';
  }

  const { data: registros } = await sb.from('user_workspace')
    .select('*').eq('user_id', user.id).order('created_at', { ascending: false });

  const cont = document.getElementById('modulosContainer');

  if(!registros || registros.length === 0){
    cont.innerHTML = `<div class="modulo"><div class="vacio">Todavía no has usado ninguna herramienta. <a href="empresas.html">Conoce el Diagnóstico CIMA®</a> para empezar.</div></div>`;
    return;
  }

  const porModulo = {};
  registros.forEach(r => {
    if(!porModulo[r.tool_slug]) porModulo[r.tool_slug] = [];
    porModulo[r.tool_slug].push(r);
  });

  cont.innerHTML = Object.keys(porModulo).map(slug => {
    const info = NOMBRES_MODULO[slug] || { nombre: slug, icono: slug.slice(0,3).toUpperCase() };
    const filas = porModulo[slug];
    return `
      <div class="modulo">
        <div class="modulo-head">
          <div class="modulo-icon">${info.icono}</div>
          <div>
            <div class="modulo-titulo">${info.nombre}</div>
            <div class="modulo-count">${filas.length} registro${filas.length===1?'':'s'}</div>
          </div>
        </div>
        <table class="tabla-registros">
          <thead><tr><th>Documento</th><th>Fecha</th><th>Estado</th><th>Acciones</th></tr></thead>
          <tbody>
            ${filas.map(f => `
              <tr>
                <td>${f.title || 'Sin título'}</td>
                <td>${formatearFecha(f.created_at)}</td>
                <td><span class="estado-pill">Finalizado</span></td>
                <td>
                  <a class="accion-link" onclick="verDetalle('${slug}','${f.record_id}')">Ver</a>
                  <a class="accion-link" onclick="verDetalle('${slug}','${f.record_id}',true)">Descargar</a>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }).join('');
}

async function verDetalle(slug, recordId, descargarDirecto){
  const modal = document.getElementById('modalDetalle');
  const body = document.getElementById('modalBody');
  document.getElementById('modalTitulo').textContent = 'Cargando...';
  document.getElementById('modalSub').textContent = '';
  body.innerHTML = 'Cargando...';
  modal.classList.add('open');

  if(slug === 'cima'){
    const { data: d } = await sb.from('diagnosticos').select('*').eq('id', recordId).maybeSingle();
    if(!d){ body.innerHTML = 'No se pudo cargar este registro.'; return; }
    document.getElementById('modalTitulo').textContent = d.empresa || 'Diagnóstico CIMA®';
    document.getElementById('modalSub').textContent = `${formatearFecha(d.created_at)} · ${d.score_total}% · ${d.nivel}`;
    const texto = (d.informe_texto || 'Sin informe disponible.')
      .replace(/#{1,6}\s*/g, '')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '$1');
    body.innerHTML = texto.split(/\n\n+/).map(p => `<p style="margin-bottom:1rem;">${p.replace(/\n/g,'<br>')}</p>`).join('');
  }

  if(descargarDirecto) setTimeout(() => window.print(), 400);
}

function cerrarModal(){
  document.getElementById('modalDetalle').classList.remove('open');
}

(async () => {
  const { data: { user } } = await sb.auth.getUser();
  if (user) {
    const name = (user.user_metadata?.full_name || user.email.split('@')[0]).split(' ')[0];
    document.getElementById('navRight').innerHTML = `
      <a href="mi-espacio.html" style="font-size:.78rem;font-weight:600;color:var(--muted);text-decoration:none;">Hola, ${name}</a>
      <button onclick="(async()=>{await sb.auth.signOut();window.location.reload();})()" class="btn-nav coral" style="cursor:pointer;">Salir</button>`;
  }
  cargarMiEspacio();
})();
</script>
</body>
</html>
